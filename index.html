<!DOCTYPE html>
<!-- PREVIEW FILE — sample data, password is "preview" -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Mac Station — Available Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .card { transition: transform .15s ease, box-shadow .15s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -10px rgba(0,0,0,.15); }
  .filter-select { padding: .5rem .75rem; border: 1px solid rgb(203,213,225); border-radius: .75rem; background: white; }
  .filter-select:focus { outline: none; box-shadow: 0 0 0 2px rgb(59,130,246); }
</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div id="gate" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-50">
  <div class="max-w-sm w-full bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-xl font-semibold text-slate-900">Mac Station</h1>
      <p class="text-slate-500 text-sm mt-1">Enter the password to view inventory</p>
    </div>
    <form id="gate-form" class="space-y-3">
      <input id="gate-pw" type="password" autofocus placeholder="Password"
        class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl">
        View Inventory
      </button>
      <p id="gate-error" class="text-red-600 text-sm text-center hidden">Wrong password. Try again.</p>
      <p class="text-xs text-slate-400 text-center mt-3">Preview password: <code>preview</code></p>
    </form>
  </div>
</div>

<div id="app" class="hidden">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-lg sm:text-xl font-semibold">Mac Station</h1>
        <p class="text-xs text-slate-500"><span id="count">0</span> items available · Updated Apr 18, 2026</p>
      </div>
      <a href="sms:+15706754777" class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-full whitespace-nowrap">
        💬 Contact
      </a>
    </div>
  </header>

  <section class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <input id="search" type="search" placeholder="Search model, spec, or keyword…"
        class="w-full px-4 py-2.5 border border-slate-300 rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-sm">
        <select id="f-category" class="filter-select"><option value="">All types</option></select>
        <select id="f-year"     class="filter-select"><option value="">Any year</option></select>
        <select id="f-ram"      class="filter-select"><option value="">Any RAM</option></select>
        <select id="f-storage"  class="filter-select"><option value="">Any storage</option></select>
      </div>
      <div class="flex items-center gap-4 mt-2 text-xs text-slate-600">
        <label class="flex items-center gap-1"><input id="f-charger" type="checkbox" /> Charger included</label>
        <label class="flex items-center gap-1"><input id="f-gradea" type="checkbox" /> Grade A only</label>
        <button id="clear-filters" class="ml-auto text-blue-600 hover:underline">Clear filters</button>
      </div>
    </div>
  </section>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <div id="empty" class="hidden text-center py-16 text-slate-500">
      <div class="text-5xl mb-2">🔍</div>
      <p>No items match your filters.</p>
    </div>
  </main>

  <footer class="max-w-6xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
    All items are carefully tested. Contact us with any questions.
  </footer>
</div>

<script>
(() => {
  // SHA-256 of "preview"
  const PASSWORD_HASH = "5975cf1bba432391c94667f5886225f69377c0aa8b9fa21fddfb21c89bcf9092";
  const ITEMS = [
    { model_name: "MacBook Pro 13\"", category: "MacBook Pro", year: 2019, ram: 16, storage: 512, cpu: "i7", display: "13\" Retina", color: "Space Gray", battery_code: "A", grade_a: 1, has_charger: 1, has_touchbar: 1, sku: "MBP13-16-512-A-US" },
    { model_name: "MacBook Pro 15\"", category: "MacBook Pro", year: 2018, ram: 32, storage: 1000, cpu: "i9", display: "15\" Retina", color: "Silver", battery_code: "B", grade_a: 0, has_charger: 1, has_touchbar: 1, sku: "MBP15-32-1TB-B-US" },
    { model_name: "MacBook Air", category: "MacBook Air", year: 2020, ram: 8, storage: 256, cpu: "M1", display: "13\" Retina", color: "Gold", battery_code: "A", grade_a: 1, has_charger: 1, has_touchbar: 0, sku: "MBA-8-256-A-US" },
    { model_name: "MacBook Air", category: "MacBook Air", year: 2022, ram: 16, storage: 512, cpu: "M2", display: "13.6\" Retina", color: "Midnight", battery_code: "A", grade_a: 1, has_charger: 1, has_touchbar: 0, sku: "MBA-16-512-A-US" },
    { model_name: "iMac", category: "iMac", year: 2019, ram: 16, storage: 512, cpu: "i5", display: "21.5\" 4K", color: "Silver", battery_code: null, grade_a: 0, has_charger: 0, has_touchbar: 0, sku: "IMAC-16-512-US" },
    { model_name: "Mac mini", category: "Mac mini", year: 2020, ram: 8, storage: 256, cpu: "M1", display: null, color: "Silver", battery_code: null, grade_a: 1, has_charger: 1, has_touchbar: 0, sku: "MINI-8-256-US" },
    { model_name: "MacBook Pro 14\"", category: "MacBook Pro", year: 2021, ram: 16, storage: 512, cpu: "M1 Pro", display: "14\" Liquid Retina", color: "Space Gray", battery_code: "A", grade_a: 1, has_charger: 1, has_touchbar: 0, sku: "MBP14-16-512-A-US" },
    { model_name: "MacBook Pro 16\"", category: "MacBook Pro", year: 2023, ram: 32, storage: 1000, cpu: "M2 Max", display: "16\" Liquid Retina XDR", color: "Space Black", battery_code: "A", grade_a: 1, has_charger: 1, has_touchbar: 0, sku: "MBP16-32-1TB-A-US" },
  ];

  async function sha256(s) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }
  const gate = document.getElementById("gate");
  const gateForm = document.getElementById("gate-form");
  const gatePw = document.getElementById("gate-pw");
  const gateError = document.getElementById("gate-error");
  const app = document.getElementById("app");

  if (sessionStorage.getItem("catalog_unlocked") === "1") { gate.classList.add("hidden"); app.classList.remove("hidden"); render(); }

  gateForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const hash = await sha256(gatePw.value);
    if (hash === PASSWORD_HASH) { sessionStorage.setItem("catalog_unlocked", "1"); gate.classList.add("hidden"); app.classList.remove("hidden"); render(); }
    else { gateError.classList.remove("hidden"); gatePw.value = ""; gatePw.focus(); }
  });

  function unique(arr, key) { return [...new Set(arr.map(x => x[key]).filter(v => v != null && v !== ""))].sort((a, b) => typeof a === "number" ? a - b : String(a).localeCompare(String(b))); }
  function fillSelect(id, values, fmt = (v) => v) { const sel = document.getElementById(id); for (const v of values) { const o = document.createElement("option"); o.value = v; o.textContent = fmt(v); sel.appendChild(o); } }
  fillSelect("f-category", unique(ITEMS, "category"));
  fillSelect("f-year",     unique(ITEMS, "year"));
  fillSelect("f-ram",      unique(ITEMS, "ram"), v => `${v} GB RAM`);
  fillSelect("f-storage",  unique(ITEMS, "storage"), v => v >= 1000 ? `${v/1000} TB` : `${v} GB`);

  function matches(item, f) {
    if (f.search) { const hay = `${item.model_name||""} ${item.sku||""} ${item.cpu||""} ${item.display||""} ${item.color||""}`.toLowerCase(); if (!hay.includes(f.search)) return false; }
    if (f.category && item.category !== f.category) return false;
    if (f.year && String(item.year) !== String(f.year)) return false;
    if (f.ram && String(item.ram) !== String(f.ram)) return false;
    if (f.storage && String(item.storage) !== String(f.storage)) return false;
    if (f.charger && !item.has_charger) return false;
    if (f.gradea && !item.grade_a) return false;
    return true;
  }

  function storageLabel(v) { return v >= 1000 ? `${v/1000} TB` : `${v} GB`; }
  function batteryLabel(code) { if (!code) return null; const m = { A: "Excellent battery", B: "Good battery", C: "Fair battery", D: "Needs service" }; return m[code.toUpperCase()] || `Battery: ${code}`; }

  function cardEl(it) {
    const div = document.createElement("div");
    div.className = "card bg-white rounded-2xl border border-slate-200 p-4";
    const title = it.model_name || it.model || "Mac";
    const chips = []; if (it.ram) chips.push(`${it.ram} GB RAM`); if (it.storage) chips.push(storageLabel(it.storage)); if (it.cpu) chips.push(it.cpu); if (it.display) chips.push(it.display); if (it.color) chips.push(it.color);
    const tags = []; if (it.grade_a) tags.push(["Grade A", "bg-emerald-100 text-emerald-800"]); if (it.has_charger) tags.push(["Charger included", "bg-blue-100 text-blue-800"]); if (it.has_touchbar) tags.push(["Touch Bar", "bg-slate-100 text-slate-700"]);
    const batt = batteryLabel(it.battery_code);
    div.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-2">
        <h3 class="font-semibold text-slate-900">${title}${it.year ? ` · ${it.year}` : ""}</h3>
      </div>
      <div class="flex flex-wrap gap-1.5 mb-3">
        ${chips.map(c => `<span class="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full">${c}</span>`).join("")}
      </div>
      ${batt ? `<p class="text-sm text-slate-600 mb-2">🔋 ${batt}</p>` : ""}
      <div class="flex flex-wrap gap-1.5">
        ${tags.map(([t, cls]) => `<span class="text-xs ${cls} px-2 py-0.5 rounded-full">${t}</span>`).join("")}
      </div>
    `;
    return div;
  }

  function render() {
    const f = {
      search:   document.getElementById("search").value.trim().toLowerCase(),
      category: document.getElementById("f-category").value,
      year:     document.getElementById("f-year").value,
      ram:      document.getElementById("f-ram").value,
      storage:  document.getElementById("f-storage").value,
      charger:  document.getElementById("f-charger").checked,
      gradea:   document.getElementById("f-gradea").checked,
    };
    const filtered = ITEMS.filter(it => matches(it, f));
    document.getElementById("count").textContent = filtered.length;
    const grid = document.getElementById("grid"); const empty = document.getElementById("empty");
    grid.innerHTML = "";
    if (filtered.length === 0) { empty.classList.remove("hidden"); return; }
    empty.classList.add("hidden");
    for (const it of filtered) grid.appendChild(cardEl(it));
  }

  ["search","f-category","f-year","f-ram","f-storage","f-charger","f-gradea"].forEach(id => {
    document.getElementById(id).addEventListener("input", render);
    document.getElementById(id).addEventListener("change", render);
  });
  document.getElementById("clear-filters").addEventListener("click", () => {
    ["search","f-category","f-year","f-ram","f-storage"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("f-charger").checked = false;
    document.getElementById("f-gradea").checked = false;
    render();
  });
})();
</script>
</body>
</html>
